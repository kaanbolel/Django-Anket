{% extends "polls/base.html" %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card p-4">
            <h2 class="mb-4 text-center">{{ question.question_text }}</h2>
            <form action="{% url 'polls:vote' question.id %}" method="post">
                {% csrf_token %}
                {% if error_message %}<div class="alert alert-danger">{{ error_message }}</div>{% endif %}
                
                {% for choice in question.choice_set.all %}
                    <div class="form-check mb-3 p-3 border rounded shadow-sm">
                        <input class="form-check-input" type="radio" name="choice" id="choice{{ forloop.counter }}" value="{{ choice.id }}">
                        <label class="form-check-label w-100" for="choice{{ forloop.counter }}">
                            {{ choice.choice_text }}
                        </label>
                    </div>
                {% endfor %}
                
                <div class="d-grid mt-4">
                    <button type="submit" class="btn btn-primary btn-vote">Oyu Gönder</button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
